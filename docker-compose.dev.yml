version: '3.8'

# 开发环境配置
# 使用方式: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  tcm-diagnosis:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      # 挂载源代码以支持热重载
      - ./backend:/app/backend
      - ./frontend:/app/frontend
    environment:
      - PYTHONUNBUFFERED=1
    command: >
      sh -c "pip install watchdog &&
             python -m uvicorn backend.main:app --host 0.0.0.0 --port 22687 --reload"
    ports:
      - "22687:22687"

