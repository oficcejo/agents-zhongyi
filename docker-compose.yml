version: '3.8'

services:
  tcm-diagnosis:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tcm-diagnosis-system
    image: tcm-diagnosis:latest
    ports:
      - "22687:22687"
    environment:
      # DeepSeek API 配置
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_API_BASE=${DEEPSEEK_API_BASE:-https://api.deepseek.com/v1}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:22687/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - tcm-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  tcm-network:
    driver: bridge

